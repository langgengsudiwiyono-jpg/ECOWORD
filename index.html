<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOWORD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Glosarium istilah ekonomi</h1>
        <p class="subtitle">Server Publik Real-Time • Uji Sejago apa dirimu!</p>
    </header>

    <main>
        <!-- Form Tambah Istilah -->
        <section class="card form-section">
            <h2>Tambah Istilah Baru</h2>
            <input type="text" id="termInput" placeholder="Masukkan Istilah (misal: APBN)">
            <textarea id="defInput" placeholder="Masukkan Definisi"></textarea>
            <button id="addTermBtn">Tambahkan ke Glosarium</button>
        </section>

        <!-- Game Flashcard ala Pokemon -->
        <section class="card game-section">
            <h2>Kartu Glosarium</h2>
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <!-- Sisi Depan Kartu (Gambar & Nama) -->
                    <div class="card-face card-front">
                        <div class="card-header">
                            <span class="card-name" id="cardTerm">Istilah</span>
                            <span class="card-number" id="cardNumber">#0</span>
                        </div>
                        <div class="card-image-area">
                            <!-- Logo STAN di sini. Ganti src dengan link gambar logomu -->
                            <img src="https://pknstan.ac.id/sites/default/files/inline-images/MASTER%20LOGO%20PKN%20STAN-EDIT_0.png" alt="Logo STAN" class="stan-logo" id="stanLogo">
                        </div>
                        <div class="card-footer">
                            <p>Coba cek definisinya</p>
                        </div>
                    </div>
                    <!-- Sisi Belakang Kartu (Definisi) -->
                    <div class="card-face card-back">
                        <div class="card-header">
                            <span class="card-name">Definisi</span>
                        </div>
                        <div class="card-text">
                            <p id="cardDef">Definisi akan muncul di sini.</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="game-controls">
                <button id="prevBtn">‹ Sebelumnya</button>
                <button id="flipBtn">Balik Kartu</button>
                <button id="nextBtn">Berikutnya ›</button>
            </div>
        </section>

        <!-- Daftar Glosarium Real-Time -->
        <section class="card list-section">
            <h2>Daftar Istilah (Live Update)</h2>
            <ul id="glossaryList"></ul>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
